<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh;">

  <video id="introVideo" autoplay muted playsinline preload="auto"
    style="width:80%; max-width:500px; border-radius:12px;">
    <source src="video.mp4" type="video/mp4">
  </video>

<script>
  const video = document.getElementById("introVideo");

  // 🔁 Backup redirect (always works)
  setTimeout(() => {
    window.location.href = "https://hamayon.carrd.co";
  }, 6000);

  // 🎬 If video plays, redirect after it ends
  video.onended = () => {
    window.location.href = "https://hamayon.carrd.co";
  };

  // ▶️ Force play (fix for some browsers)
  video.play().catch(() => {});
</script>

</body>
</html>
